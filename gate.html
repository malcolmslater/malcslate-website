<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GTSF Offline</title>
<style>
:root {
  --bg:#0d4c5d; --bg2:#07323e; --hot:#ff5578; --cyan:#9af8ff;
  --line:rgba(255,255,255,.25); --green:#4dff8a; --yellow:#ffe45e;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:#fff;
  padding-bottom:10px;
}
header {
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(13,76,93,.98);
  border-bottom:1px solid var(--line);
  padding:5px 7px 6px;
}
h1 {
  margin:0 0 4px;
  color:var(--cyan);
  font-size:.72rem;
  line-height:1;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.stageRow {
  margin-bottom:5px;
}
select,input,button {
  font-family:inherit;
}
select,input {
  width:100%;
  border:0;
  border-radius:6px;
  background:var(--hot);
  color:white;
  padding:6px 7px;
  font-size:.78rem;
  font-weight:900;
  min-height:30px;
}
input::placeholder { color:rgba(255,255,255,.75); }
.quickRow {
  display:grid;
  grid-template-columns:minmax(80px,1fr) 35px 29px 29px 29px 29px;
  gap:5px;
  align-items:center;
}
button {
  border:0;
  border-radius:6px;
  background:#164f5f;
  color:#fff;
  font-weight:900;
  padding:6px 6px;
  min-height:30px;
  font-size:.76rem;
}
button.hot, .dayBtn.active {
  background:var(--hot);
}
.actions {
  margin-top:5px;
  display:flex;
  gap:5px;
  overflow-x:auto;
  white-space:nowrap;
}
.actions button {
  flex:0 0 auto;
  font-size:.7rem;
  padding:6px 8px;
}
main {
  width:calc(100% - 14px);
  margin:7px auto;
}
.status {
  font-size:.76rem;
  font-weight:900;
  margin-bottom:5px;
}
.banner {
  background:rgba(255,255,255,.12);
  border:1px solid var(--line);
  border-radius:9px;
  padding:8px 9px;
  font-weight:900;
  font-size:.78rem;
  margin-bottom:7px;
}
.dayTitle {
  color:var(--cyan);
  font-size:.9rem;
  margin:10px 0 4px;
  text-transform:uppercase;
}
.card {
  background:rgba(200,214,218,.72);
  border-radius:7px;
  margin:5px 0;
  padding:8px 9px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:4px 8px;
}
.artist {
  color:var(--cyan);
  font-weight:1000;
  text-transform:uppercase;
  font-size:.88rem;
  letter-spacing:.03em;
}
.meta,.note {
  grid-column:1;
  font-size:.76rem;
  font-weight:900;
}
.note {
  font-family:ui-monospace,Menlo,Consolas,monospace;
}
.star {
  grid-column:2;
  grid-row:1/4;
  background:transparent;
  border:0;
  font-size:1.35rem;
  padding:1px 4px;
  min-height:0;
}
.star.on {
  color:#ffe55d;
}
.onNow {
  border:2px solid var(--green);
}
.soon15 {
  border:2px solid var(--yellow);
}
.badge {
  display:inline-block;
  border-radius:999px;
  padding:2px 7px;
  font-size:.68rem;
  font-weight:1000;
  margin-left:4px;
}
.badge.now { background:var(--green); color:#04301a; }
.badge.soon { background:var(--yellow); color:#3e3300; }
.empty {
  border:2px dashed var(--line);
  border-radius:10px;
  padding:16px;
  font-weight:900;
  font-size:.85rem;
}
.stageGrid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
}
.stageChip {
  background:var(--hot);
  text-align:left;
  padding:10px;
  font-size:.78rem;
  border-radius:8px;
}
.stageChip small {
  display:block;
  opacity:.88;
  margin-top:3px;
}
</style>
</head>
<body>
<header>
  <h1>GTSF</h1>
  <div class="stageRow">
    <select id="stage"></select>
  </div>
  <div class="quickRow">
    <input id="q" placeholder="Search">
    <button class="dayBtn active" data-day="">All</button>
    <button class="dayBtn" data-day="Thursday">T</button>
    <button class="dayBtn" data-day="Friday">F</button>
    <button class="dayBtn" data-day="Saturday">S</button>
    <button class="dayBtn" data-day="Sunday">S</button>
  </div>
  <div class="actions">
    <button class="hot" id="nowBtn">Now/next</button>
    <button id="favBtn">Itinerary</button>
    <button id="stageMapBtn">Stages</button>
    <button id="clearBtn">Clear</button>
  </div>
</header>
<main>
  <div id="status" class="status"></div>
  <div id="results"></div>
</main>

function favs() { return JSON.parse(localStorage.getItem("gtsfFavs") || "[]"); }
function saveFavs(v) { localStorage.setItem("gtsfFavs", JSON.stringify(v)); }
function isFav(r) { return favs().includes(key(r)); }
function toggleFav(k) {
  const f = favs();
  const i = f.indexOf(k);
  if (i >= 0) f.splice(i, 1); else f.push(k);
  saveFavs(f);
  render();
}
function toMin(t) {
  if (!t || !t.includes(":")) return 99999;
  let [h,m] = t.split(":").map(Number);
  if (h < 5) h += 24;
  return h*60+m;
}
function sortRows(rows) {
  return rows.sort((a,b) =>
    (dayOrder[a.Day]??99)-(dayOrder[b.Day]??99) ||
    toMin(a.Start)-toMin(b.Start) ||
    String(a.Stage).localeCompare(String(b.Stage)) ||
    String(a.Artist).localeCompare(String(b.Artist))
  );
}
function actualDate(r, field) {
  const base = festivalDates[r.Day], t = r[field];
  if (!base || !t) return null;
  let [h,m] = t.split(":").map(Number);
  const d = new Date(base + "T00:00:00");
  d.setHours(h, m || 0, 0, 0);
  if (h < 5) d.setDate(d.getDate()+1);
  return d;
}
function liveState(r) {
  const now = new Date(), s = actualDate(r,"Start"), e = actualDate(r,"End");
  if (!s || !e) return "";
  const diff = (s-now)/60000;
  if (now >= s && now <= e) return "now";
  if (diff > 0 && diff <= 15) return "soon";
  return "";
}
function nextFavText() {
  const f = favs();
  if (!f.length) return "";
  const now = new Date();
  const up = schedule
    .filter(r => f.includes(key(r)))
    .map(r => ({r, start: actualDate(r,"Start")}))
    .filter(x => x.start && x.start >= now)
    .sort((a,b) => a.start-b.start)[0];
  if (!up) return "❤️ No more starred acts coming up.";
  const mins = Math.round((up.start-now)/60000), r = up.r;
  return mins <= 20
    ? `🔔 Next favourite starts in ${mins} mins: ${r.Artist} at ${r.Stage} (${r.Start})`
    : `❤️ Next favourite: ${r.Artist} at ${r.Stage} — ${r.Day} ${r.Start}`;
}
function populate() {
  const stages = uniq(schedule.map(r => r.Stage)).sort((a,b)=>a.localeCompare(b));
  stageEl.innerHTML = '<option value="">All stages</option>' + stages.map(st => `<option value="${esc(st)}">${esc(st)}</option>`).join("");
}
function baseFiltered() {
  const q = qEl.value.trim().toLowerCase();
  return sortRows(schedule.filter(r =>
    (!currentDay || r.Day === currentDay) &&
    (!stageEl.value || r.Stage === stageEl.value) &&
    (!q || [r.Artist,r.Day,r.Stage,r.Start,r.End,r.Notes].join(" ").toLowerCase().includes(q)) &&
    (mode !== "favs" || isFav(r))
  ));
}
function nowRows() {
  const rows = baseFiltered();
  const d = new Date();
  const iso = d.toISOString().slice(0,10);
  const day = Object.entries(festivalDates).find(([k,v]) => v === iso)?.[0] || currentDay;
  const min = d.getHours()*60 + d.getMinutes();
  const pool = day ? rows.filter(r => r.Day === day) : rows;
  return sortRows([...new Map([
    ...pool.filter(r => toMin(r.Start) <= min && min <= toMin(r.End)),
    ...pool.filter(r => toMin(r.Start) >= min).slice(0,10)
  ].map(r => [key(r), r])).values()]);
}
function renderStageMap() {
  const stages = uniq(schedule.map(r => r.Stage)).sort((a,b)=>a.localeCompare(b));
  statusEl.textContent = `${stages.length} stages`;
  resultsEl.innerHTML =
    '<div class="banner">Tap a stage.</div><div class="stageGrid">' +
    stages.map(st => `<button class="stageChip" data-stage="${esc(st)}">${esc(st)}<small>${schedule.filter(r=>r.Stage===st).length} items</small></button>`).join("") +
    '</div>';
}
function render() {
  if (mode === "stageMap") return renderStageMap();
  const rows = mode === "now" ? nowRows() : baseFiltered();
  statusEl.textContent = `${rows.length} result${rows.length===1 ? "" : "s"}`;
  let banner = "";
  const favMsg = nextFavText();
  if (mode === "favs") banner = `<div class="banner">❤️ My itinerary<br>${esc(favMsg)}</div>`;
  else if (favMsg) banner = `<div class="banner">${esc(favMsg)}</div>`;

  if (!rows.length) {
    resultsEl.innerHTML = banner + '<div class="empty">No matches.</div>';
    return;
  }

  let html = banner;
  let lastDay = "";
  for (const r of rows) {
    if (r.Day !== lastDay) {
      lastDay = r.Day;
      html += `<h2 class="dayTitle">${esc(lastDay)}</h2>`;
    }
    const state = liveState(r);
    const cls = state === "now" ? "onNow" : state === "soon" ? "soon15" : "";
    const badge = state === "now" ? '<span class="badge now">ON NOW</span>' : state === "soon" ? '<span class="badge soon">15 MINS</span>' : "";
    const k = key(r);
    html += `<article class="card ${cls}">
      <div class="artist">${esc(r.Artist)}</div>
      <button class="star ${isFav(r) ? "on" : ""}" data-fav-key="${esc(k)}">${isFav(r) ? "★" : "☆"}</button>
      <div class="meta">${esc(r.Day)} · ${esc(r.Start)}–${esc(r.End)} · ${esc(r.Stage)}</div>
      ${(r.Notes || badge) ? `<div class="note">${esc(r.Notes)} ${badge}</div>` : ""}
    </article>`;
  }
  resultsEl.innerHTML = html;
}

stageEl.addEventListener("change", () => { mode="all"; render(); });
qEl.addEventListener("input", () => { mode="all"; render(); });

document.querySelectorAll(".dayBtn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentDay = btn.dataset.day;
    mode = "all";
    document.querySelectorAll(".dayBtn").forEach(b => b.classList.toggle("active", b.dataset.day === currentDay));
    render();
  });
});

document.getElementById("nowBtn").onclick = () => { mode="now"; render(); };
document.getElementById("favBtn").onclick = () => { mode = mode==="favs" ? "all" : "favs"; render(); };
document.getElementById("stageMapBtn").onclick = () => { mode="stageMap"; render(); };
document.getElementById("clearBtn").onclick = () => {
  stageEl.value = "";
  qEl.value = "";
  currentDay = "";
  mode = "all";
  document.querySelectorAll(".dayBtn").forEach(b => b.classList.toggle("active", b.dataset.day === ""));
  render();
};

resultsEl.addEventListener("click", e => {
  const star = e.target.closest(".star");
  if (star) { e.preventDefault(); toggleFav(star.dataset.favKey); return; }
  const st = e.target.closest(".stageChip");
  if (st) { stageEl.value = st.dataset.stage; mode = "all"; render(); }
});

populate();
render();
</script>
</body>
</html>
