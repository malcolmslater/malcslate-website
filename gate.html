<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GTSF Offline Schedule</title>
<style>
:root {
  --bg:#0d4c5d; --bg2:#07323e; --hot:#ff5578; --cyan:#9af8ff;
  --card:#91aab4; --line:rgba(255,255,255,.25); --green:#4dff8a; --yellow:#ffe45e;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2)); color:#fff; padding-bottom:16px;
}
header {
  position:sticky; top:0; z-index:10; background:rgba(13,76,93,.97);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:14px;
}
h1 { margin:0; color:var(--cyan); text-transform:uppercase; letter-spacing:.04em; font-size:clamp(1.4rem,4vw,2.3rem); }
.sub { margin-top:4px; font-weight:800; }
.filters { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:14px; }
label { display:block; color:var(--cyan); font-weight:900; margin-bottom:5px; font-size:.85rem; }
select,input {
  width:100%; border:0; border-radius:8px; background:var(--hot); color:white;
  padding:13px; font-size:1rem; font-weight:900; box-shadow:0 4px 10px rgba(0,0,0,.25);
}
input::placeholder { color:rgba(255,255,255,.75); }
.buttons { display:flex; flex-wrap:wrap; gap:9px; margin-top:12px; }
button {
  border:0; border-radius:999px; padding:10px 14px; background:#164f5f;
  color:#fff; font-weight:900; cursor:pointer;
}
button.hot { background:var(--hot); }
main { width:min(1160px,calc(100% - 24px)); margin:18px auto; }
.status { font-weight:900; margin-bottom:12px; }
.banner {
  background:rgba(255,255,255,.12); border:1px solid var(--line); border-radius:12px;
  padding:12px 14px; font-weight:900; margin-bottom:14px;
}
.dayTitle { color:var(--cyan); text-transform:uppercase; margin:22px 0 10px; letter-spacing:.05em; }
.card {
  background:rgba(200,214,218,.72); border-radius:7px; margin:7px 0; padding:12px 14px;
  display:grid; grid-template-columns:1.25fr .65fr .75fr 1.2fr auto; gap:10px; align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,.15);
}
.artist { color:var(--cyan); font-weight:1000; text-transform:uppercase; letter-spacing:.04em; }
.day,.time,.stage,.note { font-weight:900; }
.note { grid-column:1/-1; font-family:ui-monospace,Menlo,Consolas,monospace; }
.star { background:transparent; box-shadow:none; border:0; font-size:1.8rem; padding:6px 10px; }
.star.on { color:#ffe55d; text-shadow:0 0 8px rgba(255,229,93,.6); }
.empty { border:2px dashed var(--line); border-radius:12px; padding:22px; font-weight:900; }
.onNow { border:3px solid var(--green); box-shadow:0 0 16px rgba(77,255,138,.25); }
.soon15 { border:3px solid var(--yellow); box-shadow:0 0 16px rgba(255,228,94,.2); }
.badge { display:inline-block; border-radius:999px; padding:4px 9px; font-size:.78rem; font-weight:1000; margin-left:8px; }
.badge.now { background:var(--green); color:#04301a; }
.badge.soon { background:var(--yellow); color:#3e3300; }
.stageGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; }
.stageChip { border-radius:10px; background:var(--hot); padding:14px; text-align:left; }
.stageChip small { display:block; margin-top:4px; opacity:.9; }
@media(max-width:850px) {
  .filters { grid-template-columns:1fr 1fr; }
  .card { grid-template-columns:1fr auto; }
  .day,.time,.stage,.note { grid-column:1; }
  .star { grid-column:2; grid-row:1/4; }
}
@media(max-width:520px) {
  .filters { grid-template-columns:1fr; }
  header { padding:12px; }
}

/* ultra compact phone header */
header { padding:6px 8px 7px !important; }
h1 { font-size:.78rem !important; line-height:1 !important; letter-spacing:.03em !important; }
.sub { display:none !important; }
.compactFilters { display:grid !important; grid-template-columns:1fr !important; gap:5px !important; margin-top:5px !important; }
.stageRow label { display:none !important; }
.stageRow select { width:100% !important; }
.quickRow { display:grid; grid-template-columns: minmax(80px,1fr) repeat(5,34px); gap:5px; align-items:center; }
select,input { padding:6px 7px !important; font-size:.78rem !important; border-radius:6px !important; min-height:30px !important; }
.dayBtn { border-radius:6px !important; padding:6px 0 !important; min-height:30px !important; font-size:.78rem !important; background:#164f5f !important; }
.dayBtn.active { background:var(--hot) !important; }
.buttons { margin-top:5px !important; gap:5px !important; flex-wrap:nowrap !important; overflow-x:auto !important; }
.buttons button { padding:6px 8px !important; font-size:.72rem !important; }
main { margin-top:7px !important; }
.status { font-size:.78rem !important; margin-bottom:5px !important; }
.dayTitle { margin:10px 0 4px !important; font-size:.9rem !important; }
.card { padding:8px 9px !important; margin:5px 0 !important; }
.artist { font-size:.88rem !important; }
.day,.time,.stage,.note { font-size:.76rem !important; }

</style>
</head>
<body>
<header>
  <h1>GTSF Offline Schedule</h1>
  <div class="sub">Built from the uploaded HTML. Works offline.</div>
  <div class="filters compactFilters">
    <div class="stageRow"><label>Stage</label><select id="stage"></select></div>
    <div class="quickRow">
      <input id="q" placeholder="Search">
      <button class="dayBtn active" data-day="">All</button>
      <button class="dayBtn" data-day="Thursday">T</button>
      <button class="dayBtn" data-day="Friday">F</button>
      <button class="dayBtn" data-day="Saturday">S</button>
      <button class="dayBtn" data-day="Sunday">S</button>
    </div>
  </div>
  <div class="buttons">
    <button class="hot" id="nowBtn">Now / next</button>
    <button id="favBtn">My itinerary</button>
    <button id="stageMapBtn">Stage map</button>
    <button id="clearBtn">Clear</button>
  </div>
</header>
<main>
  <div id="status" class="status"></div>
  <div id="results"></div>
</main>

function saveFavs(v) { localStorage.setItem("gtsfFavs", JSON.stringify(v)); }
function isFav(r) { return favs().includes(key(r)); }
function toggleFav(k) { const f=favs(); const i=f.indexOf(k); if(i>=0) f.splice(i,1); else f.push(k); saveFavs(f); render(); }
function toMin(t) { if(!t||!t.includes(":")) return 99999; let [h,m]=t.split(":").map(Number); if(h<5)h+=24; return h*60+m; }
function sortRows(rows) { return rows.sort((a,b)=>(dayOrder[a.Day]??99)-(dayOrder[b.Day]??99)||toMin(a.Start)-toMin(b.Start)||String(a.Stage).localeCompare(String(b.Stage))||String(a.Artist).localeCompare(String(b.Artist))); }
function actualDate(r, field) { const base=festivalDates[r.Day], t=r[field]; if(!base||!t)return null; let [h,m]=t.split(":").map(Number); const d=new Date(base+"T00:00:00"); d.setHours(h,m||0,0,0); if(h<5)d.setDate(d.getDate()+1); return d; }
function liveState(r) { const now=new Date(), s=actualDate(r,"Start"), e=actualDate(r,"End"); if(!s||!e)return ""; const diff=(s-now)/60000; if(now>=s&&now<=e)return "now"; if(diff>0&&diff<=15)return "soon"; return ""; }
function nextFavText() {
  const f=favs(); if(!f.length)return "";
  const now=new Date();
  const up=schedule.filter(r=>f.includes(key(r))).map(r=>({r,start:actualDate(r,"Start")})).filter(x=>x.start&&x.start>=now).sort((a,b)=>a.start-b.start)[0];
  if(!up)return "❤️ No more starred acts coming up.";
  const mins=Math.round((up.start-now)/60000), r=up.r;
  return mins<=20 ? `🔔 Next favourite starts in ${mins} mins: ${r.Artist} at ${r.Stage} (${r.Start})` : `❤️ Next favourite: ${r.Artist} at ${r.Stage} — ${r.Day} ${r.Start}`;
}
function fill(sel, vals, allLabel) { sel.innerHTML = `<option value="">${allLabel}</option>` + vals.map(v=>`<option>${esc(v)}</option>`).join(""); }
function populate() {
  fill(els.stage, uniq(schedule.map(r=>r.Stage)).sort((a,b)=>a.localeCompare(b)), "All stages");
}
function baseFiltered() {
  const q = els.q.value.trim().toLowerCase();
  return sortRows(schedule.filter(r =>
    (!currentDayFilter || r.Day === currentDayFilter) &&
    (!els.stage.value || r.Stage === els.stage.value) &&
    (!q || [r.Artist,r.Day,r.Stage,r.Start,r.End,r.Notes].join(" ").toLowerCase().includes(q)) &&
    (mode !== "favs" || isFav(r))
  ));
}
function nowRows() {
  const rows=baseFiltered(), d=new Date(), iso=d.toISOString().slice(0,10);
  const day=Object.entries(festivalDates).find(([k,v])=>v===iso)?.[0] || currentDayFilter;
  const min=d.getHours()*60+d.getMinutes();
  const pool=day ? rows.filter(r=>r.Day===day) : rows;
  return sortRows([...new Map([...pool.filter(r=>toMin(r.Start)<=min&&min<=toMin(r.End)), ...pool.filter(r=>toMin(r.Start)>=min).slice(0,10)].map(r=>[key(r),r])).values()]);
}
function renderStageMap() {
  const stages=uniq(schedule.map(r=>r.Stage)).sort();
  els.status.textContent = `${stages.length} stages`;
  els.results.innerHTML = `<div class="banner">📍 Tap a stage to see everything there.</div><div class="stageGrid">` +
    stages.map(st=>`<button class="stageChip" data-stage="${esc(st)}">${esc(st)}<small>${schedule.filter(r=>r.Stage===st).length} items</small></button>`).join("") + `</div>`;
}
function render() {
  if(mode==="stageMap") return renderStageMap();
  const rows = mode==="now" ? nowRows() : baseFiltered();
  els.status.textContent = `${rows.length} result${rows.length===1 ? "" : "s"}`;
  let banner = mode==="favs" ? `<div class="banner">❤️ My itinerary<br>${esc(nextFavText())}</div>` : (nextFavText() ? `<div class="banner">${esc(nextFavText())}</div>` : "");
  if(!rows.length) { els.results.innerHTML = banner + `<div class="empty">No matches.</div>`; return; }
  let cur="", html=banner;
  for(const r of rows) {
    if(r.Day!==cur) { cur=r.Day; html += `<h2 class="dayTitle">${esc(cur)}</h2>`; }
    const state=liveState(r), cls=state==="now"?"onNow":state==="soon"?"soon15":"";
    const badge=state==="now"?`<span class="badge now">🟢 ON NOW</span>`:state==="soon"?`<span class="badge soon">🟡 STARTING IN 15 MINS</span>`:"";
    const k=key(r);
    html += `<article class="card ${cls}">
      <div class="artist">${esc(r.Artist)}</div>
      <div class="day">${esc(r.Day)}</div>
      <div class="time">${esc(r.Start)} to ${esc(r.End)}</div>
      <div class="stage">${esc(r.Stage)}</div>
      <button class="star ${isFav(r)?"on":""}" data-fav-key="${esc(k)}" aria-label="Toggle favourite">${isFav(r)?"★":"☆"}</button>
      ${(r.Notes||badge)?`<div class="note">${esc(r.Notes)} ${badge}</div>`:""}
    </article>`;
  }
  els.results.innerHTML = html;
}
["change","input"].forEach(evt => {
  els.stage.addEventListener(evt,()=>{mode="all";render();});
  els.q.addEventListener(evt,()=>{mode="all";render();});
});
  els.day.addEventListener(evt,()=>{mode="all";render();});
  els.stage.addEventListener(evt,()=>{mode="all";render();});
  els.q.addEventListener(evt,()=>{mode="all";render();});
});
$("nowBtn").onclick=()=>{mode="now";render();};
$("favBtn").onclick=()=>{mode=mode==="favs"?"all":"favs";render();};
$("stageMapBtn").onclick=()=>{mode="stageMap";render();};
$("clearBtn").onclick=()=>{
  els.stage.value="";
  els.q.value="";
  currentDayFilter="";
  mode="all";
  syncDayButtons();
  render();
};els.day.value="";els.stage.value="";els.q.value="";mode="all";render();};
els.results.addEventListener("click", e => {
  const star=e.target.closest(".star"); if(star) { e.preventDefault(); toggleFav(star.dataset.favKey); return; }
  const st=e.target.closest(".stageChip"); if(st) { els.stage.value=st.dataset.stage; mode="all"; render(); }
});

document.querySelectorAll(".dayBtn").forEach(btn => {
  btn.onclick = () => {
    currentDayFilter = btn.dataset.day;
    mode = "all";
    syncDayButtons();
    render();
  };
});
function syncDayButtons() {
  document.querySelectorAll(".dayBtn").forEach(btn => btn.classList.toggle("active", btn.dataset.day === currentDayFilter));
}
populate(); render();
</script>
</body>
</html>
